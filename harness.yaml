# =============================================================================
# AHE — Agentic Harness Engineering Configuration Plane
# Single source of truth: topologies, tiers, models, timeouts, lifecycle hooks.
# =============================================================================
harness_version: "1.0.0"
created: "2026-07-01"

# ---------------------------------------------------------------------------
# RUNTIME
# ---------------------------------------------------------------------------
runtime:
  host: "wsl2"
  shell: "/usr/bin/bash"
  temp_dir: "/tmp/ahe"
  default_workdir: "/root"

  # tmux dark-factory runtime
  tmux:
    enabled: true
    session_prefix: "dark-factory"
    log_dir: "/root/.hermes/agents/dark-factory/logs"
    worktree_dir: "/root/.hermes/agents/dark-factory/worktrees"
    pane_status_interval_sec: 5
    max_sessions: 8

# ---------------------------------------------------------------------------
# RISK TIERS — Dynamic Power Scaling (optimized tokenomics)
# Build with frontier, verify with cheap, trivial with cheapest.
# ---------------------------------------------------------------------------
tiers:
  trivial:
    label: "T1 — Trivial"
    description: "Typos, README, single-line fixes, docs only"
    model: "oc/deepseek-v4-flash-free"            # ← FREE via OmniRoute
    fallback: "groq/qwen/qwen3.6-27b"
    timeout_sec: 60
    max_turns: 5
    agents: []
    pi_verify: false
    auto_approve: true
    git_diff_max_lines: 10

  standard:
    label: "T2 — Standard"
    description: "Unit tests, formatting, isolated refactors < 50 lines"
    model: "nvidia/deepseek-ai/deepseek-v4-flash"  # ← via OmniRoute/NVIDIA
    fallback: "groq/qwen/qwen3.6-27b"
    timeout_sec: 180
    max_turns: 15
    agents: ["opencode-builder"]
    pi_verify: true
    pi_agents: ["pi-quality-gate"]
    pi_model: "groq/qwen/qwen3.6-27b"              # ← via OmniRoute/Groq
    auto_approve: true
    git_diff_max_lines: 50

  full:
    label: "T3 — Full Suite"
    description: "Business logic, API changes, multi-file features"
    model: "nvidia/deepseek-ai/deepseek-v4-pro"     # ← via OmniRoute/NVIDIA
    fallback: "nvidia/deepseek-ai/deepseek-v4-flash"
    timeout_sec: 600
    max_turns: 50
    agents:
      build: ["opencode-spec", "opencode-architect", "opencode-builder"]
      review: ["opencode-reviewer"]
    agent_models:
      opencode-reviewer: "nvidia/deepseek-ai/deepseek-v4-flash"
      opencode-spec: "nvidia/deepseek-ai/deepseek-v4-pro"
      opencode-architect: "nvidia/deepseek-ai/deepseek-v4-pro"
      opencode-builder: "nvidia/deepseek-ai/deepseek-v4-pro"
    pi_verify: true
    pi_agents: ["pi-security", "pi-test-coverage", "pi-quality-gate"]
    pi_model: "groq/qwen/qwen3.6-27b"              # ← via OmniRoute/Groq
    pi_fan_out: "parallel"
    auto_approve: false
    git_diff_max_lines: 200

  critical:
    label: "T4 — Critical"
    description: "Auth, DB migrations, security, production-infra changes"
    model: "nvidia/deepseek-ai/deepseek-v4-pro"     # ← via OmniRoute/NVIDIA
    fallback: "nvidia/deepseek-ai/deepseek-v4-flash"
    timeout_sec: 1200
    max_turns: 100
    agents:
      build: ["opencode-spec", "opencode-architect", "opencode-builder", "opencode-migration"]
      review: ["opencode-reviewer", "opencode-ship"]
    agent_models:
      opencode-reviewer: "nvidia/deepseek-ai/deepseek-v4-flash"
      opencode-ship: "nvidia/deepseek-ai/deepseek-v4-flash"
    pi_verify: true
    pi_agents: ["pi-security", "pi-test-coverage", "pi-quality-gate", "pi-observability"]
    pi_model: "nvidia/deepseek-ai/deepseek-v4-flash"  # security audit needs flash
    pi_fan_out: "parallel"
    auto_approve: false
    human_in_the_loop: true
    require_adr: true

  pm_review:
    label: "PM — Review"
    description: "PRD quality, strategy consistency, market fit assessment"
    model: "groq/qwen/qwen3.6-27b"                 # ← via OmniRoute/Groq
    fallback: "nvidia/deepseek-ai/deepseek-v4-flash"
    timeout_sec: 300
    max_turns: 25
    agents: ["pi-pm-prd-review", "pi-pm-strategy-check", "pi-pm-market-fit", "pi-pm-discovery-audit"]
    pi_fan_out: "parallel"
    auto_approve: true

# ---------------------------------------------------------------------------
# AGENT TOPOLOGIES
# ---------------------------------------------------------------------------
topologies:
  # PM → Engineering full pipeline
  pm_to_eng:
    label: "PM → Engineering Pipeline"
    stages:
      - phase: "discover"
        agents: ["opencode-pm-discover"]
        exit_state: "Discovery Report + OST + Experiment Plan"
      - phase: "strategy"
        agents: ["opencode-pm-strategy"]
        exit_state: "Strategy Document + Business Model"
      - phase: "prd"
        agents: ["opencode-pm-prd"]
        exit_state: "PRD.md Ready"
      - phase: "prd-gate"
        agents: ["pi-pm-prd-review"]
        exit_state: "APPROVED | REJECTED"
        gate: true
      - phase: "spec"
        agents: ["opencode-spec"]
        exit_state: "Task Breakdown Ready"
      - phase: "architect"
        agents: ["opencode-architect"]
        exit_state: "ADR + API Contracts"
      - phase: "build"
        agents: ["opencode-builder"]
        exit_state: "Implemented + Tests Passing"
      - phase: "verify"
        agents: ["pi-security", "pi-test-coverage", "pi-quality-gate"]
        fan_out: "parallel"
        exit_state: "ALL GATES PASSED | BLOCKED"
        gate: true
      - phase: "ship"
        agents: ["opencode-ship"]
        exit_state: "Released + Changelog Published"
      - phase: "gtm"
        agents: ["opencode-pm-gtm"]
        exit_state: "Launch Plan Ready"

  # Engineering only (no PM front-end)
  eng_only:
    label: "Engineering Only"
    stages:
      - phase: "spec"
        agents: ["opencode-spec"]
        exit_state: "Task Breakdown Ready"
      - phase: "build"
        agents: ["opencode-builder"]
        exit_state: "Implemented + Tests Passing"
      - phase: "verify"
        agents: ["pi-security", "pi-test-coverage", "pi-quality-gate"]
        fan_out: "parallel"
        gate: true
      - phase: "ship"
        agents: ["opencode-ship"]

  # Quick bugfix
  bugfix:
    label: "Quick Bugfix"
    stages:
      - phase: "build"
        agents: ["opencode-builder"]
        exit_state: "Fixed + Tests Passing"
      - phase: "verify"
        agents: ["pi-quality-gate"]
        gate: true

  # Pre-release audit
  pre_release_audit:
    label: "Pre-Release Audit"
    stages:
      - phase: "audit-security"
        agents: ["pi-security"]
      - phase: "audit-test-cov"
        agents: ["pi-test-coverage"]
      - phase: "audit-observability"
        agents: ["pi-observability"]
      - phase: "final-gate"
        agents: ["pi-quality-gate"]
        gate: true

# ---------------------------------------------------------------------------
# LIFECYCLE HOOKS
# ---------------------------------------------------------------------------
hooks:
  pre_session_start:
    - command: "echo 'AHE Factory: {topology} — {tier} tier'"
    - command: "test -f .hermes.md && echo 'Project context loaded' || echo 'No .hermes.md — using defaults'"

  pre_agent_spawn:
    - event: "delegate_task"
      action: "log"
      message: "Spawning {agent} for phase {phase}"

  post_phase_complete:
    - event: "exit_state"
      action: "verify_gate"
      gates:
        pi-quality-gate: "APPROVE only — BLOCK stops the pipeline"
        pi-pm-prd-review: "APPROVED only — REJECTED sends back to PRD phase"

  post_release:
    - event: "ship"
      action: "archive_logs"
    - event: "ship"
      action: "update_changelog"

# ---------------------------------------------------------------------------
# OMNIROUTE — AI Gateway Configuration
# Local gateway at http://localhost:20128 providing 537 models across 19 providers.
# All OpenCode model calls route through OmniRoute for cost tracking + fallback.
# ---------------------------------------------------------------------------
omniroute:
  enabled: true
  endpoint: "http://localhost:20128/v1"
  dashboard: "http://localhost:20128"
  providers: 19
  total_models: 537
  free_tier_available: true
  smart_fallback: true
  cost_tracking: true

  # Local model IDs that map through OmniRoute
  model_map:
    # DeepSeek — via NVIDIA (fast, reliable)
    deepseek-pro: "nvidia/deepseek-ai/deepseek-v4-pro"
    deepseek-flash: "nvidia/deepseek-ai/deepseek-v4-flash"
    deepseek-free: "oc/deepseek-v4-flash-free"   # free tier

    # Qwen — via Groq (fast + cheap)
    qwen-cheap: "groq/qwen/qwen3.6-27b"
    qwen-plus: "groq/qwen/qwen3-32b"

    # GLM — cheapest viable via NVIDIA
    glm-cheapest: "nvidia/z-ai/glm-5.1"

    # Smart auto — routes to cheapest available that meets requirements
    auto: "auto"

    # Keep opencode-go native for direct access
    opencode-flash: "opencode-go/deepseek-v4-flash"
    opencode-pro: "opencode-go/deepseek-v4-pro"

    # Kimi code-specialized
    kimi-code: "opencode-go/kimi-k2.7-code"

# ---------------------------------------------------------------------------
# MODEL CATALOG — All available models with purpose, cost, and quality tier.
# Build with frontier, verify with cheap, trivial with the cheapest.
# Local OmniRoute gateway adds 537 models across 19 providers.
# ---------------------------------------------------------------------------
model_catalog:
  # ── Frontier (best quality, highest cost) — via OmniRoute ──
  nvidia/deepseek-ai/deepseek-v4-pro:
    tier: "frontier"
    cost_per_mtok: 2.00    # estimated USD
    quality: 10
    best_for: ["complex_code", "architecture", "reasoning", "security_audit"]
    provider: "nvidia"
    omniroute: true

  opencode-go/deepseek-v4-pro:
    tier: "frontier"
    cost_per_mtok: 2.00
    quality: 10
    best_for: ["complex_code", "architecture", "reasoning"]
    provider: "opencode-go"
    omniroute: true

  # ── Fast (good quality, moderate cost) — via OmniRoute ──
  nvidia/deepseek-ai/deepseek-v4-flash:
    tier: "fast"
    cost_per_mtok: 0.50
    quality: 8
    best_for: ["code_review", "tdd", "debugging", "prd_writing", "marketing"]
    provider: "nvidia"
    omniroute: true

  opencode-go/deepseek-v4-flash:
    tier: "fast"
    cost_per_mtok: 0.50
    quality: 8
    best_for: ["code_review", "tdd", "debugging", "prd_writing", "marketing"]
    provider: "opencode-go"
    omniroute: true

  groq/qwen/qwen3-32b:
    tier: "fast"
    cost_per_mtok: 0.35
    quality: 7.5
    best_for: ["pm_writing", "analysis", "strategy"]
    provider: "groq"
    omniroute: true

  opencode-go/kimi-k2.7-code:
    tier: "fast"
    cost_per_mtok: 0.45
    quality: 8
    best_for: ["code_generation", "code_review", "refactoring"]
    provider: "opencode-go"
    omniroute: true

  # ── Cheap (good enough for verification, reading, writing)
  groq/qwen/qwen3.6-27b:
    tier: "cheap"
    cost_per_mtok: 0.15
    quality: 7
    best_for: ["verification", "pm_writing", "market_research", "docs"]
    provider: "groq"
    omniroute: true

  # ── Cheapest (trivial tasks only)
  oc/deepseek-v4-flash-free:
    tier: "cheapest"
    cost_per_mtok: 0.00    # free tier
    quality: 7
    best_for: ["trivial", "typos", "formatting", "docs_only"]
    provider: "oc"
    omniroute: true

  nvidia/z-ai/glm-5.1:
    tier: "cheapest"
    cost_per_mtok: 0.10
    quality: 6.5
    best_for: ["simple_verification", "formatting"]
    provider: "nvidia"
    omniroute: true

  # ── Smart auto (routes to best available) — via OmniRoute ──
  auto:
    tier: "auto"
    cost_per_mtok: 0.50  # average
    quality: 8
    best_for: ["general", "fallback", "testing"]
    provider: "omniroute"
    omniroute: true
    notes: "Intelligent routing — picks cheapest model that meets quality requirements"

# ---------------------------------------------------------------------------
# MODEL BINDINGS — Per-role model assignment with fallback chains
# The orchestrator picks the model based on:
#   1. agent-specific override (agent_models)
#   2. role default (models.role.primary)
#   3. tier default (tiers.N.model)
#   4. fallback if primary fails
# ---------------------------------------------------------------------------
models:
  # ── Role-level defaults (applied when no agent or tier override exists) ──
  build:
    primary: "opencode-go/deepseek-v4-pro"
    fallback:
      - "opencode-go/deepseek-v4-flash"
      - "opencode-go/kimi-k2.7-code"
    description: "Complex code generation — spec, architect, builder, migration"
    qualifier: "quality-critical — only use pro for complex multi-file changes"

  review:
    primary: "opencode-go/deepseek-v4-flash"
    fallback:
      - "opencode-go/kimi-k2.7-code"
      - "opencode-go/qwen3.7-plus"
    description: "Code review, quality gate — judgment tasks don't need frontier"
    qualifier: "flash is sufficient for reading and evaluating code"

  verify:
    primary: "opencode-go/qwen3.7-plus"
    fallback:
      - "opencode-go/deepseek-v4-flash"
      - "opencode-go/glm-5.2"
    description: "Pi agents — verification and pattern-matching only"
    qualifier: "never use pro for verify — verification is cheaper than generation"

  pm_write:
    primary: "opencode-go/qwen3.7-plus"
    fallback:
      - "opencode-go/qwen3.7-max"
      - "opencode-go/deepseek-v4-flash"
    description: "PM content — PRD, strategy, marketing, discovery docs"
    qualifier: "writing tasks don't need frontier reasoning — plus/max is sufficient"

  pm_verify:
    primary: "opencode-go/qwen3.7-plus"
    fallback:
      - "opencode-go/glm-5.2"
      - "opencode-go/deepseek-v4-flash"
    description: "Pi PM agents — PRD review, strategy check, market fit"
    qualifier: "reading and evaluating documents — cheapest viable model"

  trivial:
    primary: "opencode-go/qwen3.6-plus"
    fallback:
      - "opencode-go/qwen3.7-plus"
      - "opencode-go/glm-5.2"
    description: "T1 — typos, formatting, single-line docs fixes"
    qualifier: "cheapest model available — any model can handle this"

# ---------------------------------------------------------------------------
# PER-AGENT MODEL OVERRIDES (highest priority)
# If an agent needs a specific model regardless of tier, set it here.
# ---------------------------------------------------------------------------
agent_models:
  # ── Engineering build agents ──
  opencode-spec:
    model: "nvidia/deepseek-ai/deepseek-v4-pro"    # via OmniRoute/NVIDIA
    fallback: "opencode-go/deepseek-v4-pro"
    reason: "Spec quality gates everything downstream — invest here"

  opencode-architect:
    model: "nvidia/deepseek-ai/deepseek-v4-pro"
    fallback: "opencode-go/deepseek-v4-pro"
    reason: "Architecture decisions affect the entire system lifecycle"

  opencode-builder:
    model: "nvidia/deepseek-ai/deepseek-v4-pro"       # T3/T4
    fallback: "nvidia/deepseek-ai/deepseek-v4-flash"   # T2
    reason: "Code generation quality directly impacts test pass rate"

  opencode-migration:
    model: "nvidia/deepseek-ai/deepseek-v4-flash"
    fallback: "groq/qwen/qwen3.6-27b"
    reason: "Migration planning is pattern-based — flash is sufficient"

  opencode-reviewer:
    model: "nvidia/deepseek-ai/deepseek-v4-flash"
    fallback: "opencode-go/kimi-k2.7-code"
    reason: "Reviewing is pattern-matching — frontier not needed"

  opencode-perf:
    model: "nvidia/deepseek-ai/deepseek-v4-flash"
    fallback: "groq/qwen/qwen3.6-27b"
    reason: "Performance audit is source analysis — flash is enough"

  opencode-ship:
    model: "nvidia/deepseek-ai/deepseek-v4-flash"
    fallback: "groq/qwen/qwen3.6-27b"
    reason: "Release automation is mechanical — no frontier needed"

  # ── PM agents ──
  opencode-pm-discover:
    model: "groq/qwen/qwen3.6-27b"
    fallback: "nvidia/deepseek-ai/deepseek-v4-flash"
    reason: "Creative brainstorming — cheap is sufficient, flash if more depth needed"

  opencode-pm-strategy:
    model: "groq/qwen/qwen3-32b"
    fallback: "nvidia/deepseek-ai/deepseek-v4-flash"
    reason: "Strategy needs deeper reasoning — 32B over 27B"

  opencode-pm-prd:
    model: "groq/qwen/qwen3.6-27b"
    fallback: "nvidia/deepseek-ai/deepseek-v4-flash"
    reason: "PRD writing is structured template filling — cheap is enough"

  opencode-pm-execution:
    model: "groq/qwen/qwen3.6-27b"
    fallback: "nvidia/deepseek-ai/deepseek-v4-flash"
    reason: "Execution planning is template-based"

  opencode-pm-gtm:
    model: "groq/qwen/qwen3.6-27b"
    fallback: "groq/qwen/qwen3-32b"
    reason: "GTM is creative + strategic — cheap default, 32B for depth"

  opencode-pm-market-research:
    model: "groq/qwen/qwen3.6-27b"
    fallback: "nvidia/deepseek-ai/deepseek-v4-flash"
    reason: "Research is reading + synthesis — cheap is sufficient"

  opencode-pm-marketing:
    model: "groq/qwen/qwen3.6-27b"
    fallback: "nvidia/deepseek-ai/deepseek-v4-flash"
    reason: "Marketing is creative — cheap is enough"

  # ── Pi Engineering verify agents ──
  pi-security:
    model: "nvidia/deepseek-ai/deepseek-v4-flash"     # T4 critical
    fallback: "groq/qwen/qwen3.6-27b"                  # T3 standard
    reason: "Security audit quality scales with model capability"

  pi-test-coverage:
    model: "groq/qwen/qwen3.6-27b"
    fallback: "nvidia/z-ai/glm-5.1"
    reason: "Coverage analysis is structural — cheap model is sufficient"

  pi-quality-gate:
    model: "nvidia/deepseek-ai/deepseek-v4-flash"
    fallback: "groq/qwen/qwen3.6-27b"
    reason: "Gate verdict must be reliable — flash for consistency"

  pi-observability:
    model: "groq/qwen/qwen3.6-27b"
    fallback: "nvidia/deepseek-ai/deepseek-v4-flash"
    reason: "Observability audit is checklist-based — cheap is sufficient"

  # ── Pi PM verify agents ──
  pi-pm-prd-review:
    model: "groq/qwen/qwen3.6-27b"
    fallback: "nvidia/deepseek-ai/deepseek-v4-flash"
    reason: "PRD review is checklist comparison — cheap is sufficient"

  pi-pm-strategy-check:
    model: "groq/qwen/qwen3-32b"
    fallback: "nvidia/deepseek-ai/deepseek-v4-flash"
    reason: "Strategy consistency needs deeper reasoning — 32B over 27B"

  pi-pm-market-fit:
    model: "groq/qwen/qwen3.6-27b"
    fallback: "nvidia/z-ai/glm-5.1"
    reason: "Market fit is evidence evaluation — cheap is sufficient"

  pi-pm-discovery-audit:
    model: "groq/qwen/qwen3.6-27b"
    fallback: "nvidia/deepseek-ai/deepseek-v4-flash"
    reason: "Discovery audit is process checklist — cheap is enough"

# ---------------------------------------------------------------------------
# COST BUDGET — Daily limits to prevent runaway spending
# ---------------------------------------------------------------------------
cost_budget:
  daily_usd_cap: 5.00
  tier_weights:
    trivial: 0.02     # ~$0.02 per task
    standard: 0.15    # ~$0.15 per task
    full: 1.50        # ~$1.50 per task
    critical: 3.00    # ~$3.00 per task
    pm_review: 0.10   # ~$0.10 per task
  alerts:
    at_80_percent: true
    at_100_percent: true
    action: "pause_T3_T4"

# ---------------------------------------------------------------------------
# MODEL SELECTION RULES (priority order)
# ---------------------------------------------------------------------------
model_selection:
  priority:
    - "agent_models.{agent_name}.model"        # 1: per-agent override
    - "models.{role}.primary"                  # 2: role default
    - "tiers.{tier}.agent_models.{agent_name}" # 3: tier per-agent override
    - "tiers.{tier}.model"                     # 4: tier default
    - "models.build.primary"                   # 5: global fallback
  pi_priority:
    - "tiers.{tier}.pi_model"                  # 1: tier pi override
    - "tiers.{tier}.pi_agents.{agent_name}"    # 2: tier per-agent pi
    - "models.verify.primary"                  # 3: role default
    - "models.trivial.primary"                 # 4: cheapest fallback

# ---------------------------------------------------------------------------
# TELEMETRY
# ---------------------------------------------------------------------------
telemetry:
  jsonl_buffer: true
  jsonl_path: "/tmp/ahe/telemetry/{session_id}.jsonl"
  structured_output: "xml"
  log_level: "info"
  capture_tool_calls: true
  capture_exit_states: true
  retention_days: 7
